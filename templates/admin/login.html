<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEMA Admin — Přihlášení</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#1E4D14;display:flex;align-items:center;justify-content:center;min-height:100vh}
.box{background:white;border-radius:12px;padding:48px 40px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.logo{text-align:center;margin-bottom:32px;font-size:22px;font-weight:800;color:#1C2B1D}
.logo span{color:#1E4D14}
h2{font-size:18px;font-weight:700;text-align:center;margin-bottom:24px;color:#1C2B1D}
input{width:100%;border:1px solid #E5E7EB;border-radius:7px;padding:12px 14px;font-size:15px;margin-bottom:12px;outline:none;transition:border .2s}
input:focus{border-color:#1E4D14}
button{width:100%;background:#1E4D14;color:white;border:none;border-radius:7px;padding:13px;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px;transition:background .2s}
button:hover{background:#163A0F}
.error{color:#DC2626;font-size:13px;text-align:center;margin-bottom:10px}
</style>
</head>
<body>
<div class="box">
  <div class="logo">CEMA <span>servis</span></div>
  <h2>Přihlášení do adminu</h2>
  {% if error %}<div class="error">Špatné heslo</div>{% endif %}
  <form method="POST">
    <input type="password" name="password" placeholder="Heslo" autofocus required>
    <button type="submit">Přihlásit se</button>
  </form>
</div>
</body>
</html>
